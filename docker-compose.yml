services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: reviewbot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports: ["5432:5432"]
    volumes: [postgres_data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    command: redis-server --appendonly yes
    volumes: [redis_data:/data]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./apps/api
    ports: ["8000:8000"]
    env_file: .env
    depends_on: [postgres, redis]
    volumes: [./apps/api:/app]
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build: ./apps/api
    env_file: .env
    depends_on: [postgres, redis]
    command: celery -A core.celery_app worker -Q high,default -c 4 --loglevel=info

  dashboard:
    build: ./apps/dashboard
    ports: ["3000:3000"]
    env_file: .env
    depends_on: [api]

volumes:
  postgres_data:
  redis_data:
